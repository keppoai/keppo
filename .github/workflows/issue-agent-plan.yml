name: Issue Agent Plan Issue

on:
  workflow_call:
    inputs:
      agent_kind:
        required: true
        type: string
      agent_name:
        required: true
        type: string
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      issue_body:
        required: true
        type: string
      issue_comments_json:
        required: true
        type: string
      default_branch:
        required: true
        type: string

jobs:
  agent:
    environment: ai-bots
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    outputs:
      has_plan_comment: ${{ steps.capture.outputs.has_plan_comment }}
      plan_comment: ${{ steps.capture.outputs.plan_comment }}
      has_session_log_comment: ${{ steps.capture.outputs.has_session_log_comment }}
      session_log_comment: ${{ steps.capture.outputs.session_log_comment }}
    env:
      PLAN_COMMENT_PATH: tmp/issue-agent/plan-comment.md
      PROMPT_PATH: tmp/issue-agent/agent-plan-prompt.txt
      LOG_MARKER_PATH: tmp/issue-agent/session-log-marker
      SESSION_LOG_COMMENT_PATH: tmp/issue-agent/session-log-comment.md
      CODEX_HOME: tmp/issue-agent/codex-home
      COPILOT_HOME: tmp/issue-agent/copilot-home
      COPILOT_SESSION_DIR: tmp/issue-agent/copilot-session
      COPILOT_SESSION_SHARE_PATH: tmp/issue-agent/copilot-session/session.md
      COPILOT_CLI_VERSION: 1.0.18
      WORKFLOW_BASE_PATH: .workflow-base
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: read

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ inputs.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Checkout workflow base revision
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.sha }}
          path: ${{ env.WORKFLOW_BASE_PATH }}
          fetch-depth: 1
          persist-credentials: false

      - name: Install Codex CLI
        if: inputs.agent_kind == 'codex'
        run: npm install -g @openai/codex@latest

      - name: Install GitHub Copilot CLI
        if: inputs.agent_kind == 'gh-copilot'
        run: npm install -g @github/copilot@${COPILOT_CLI_VERSION}

      - name: Write Codex auth file
        if: inputs.agent_kind == 'codex'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_AUTH_JSON_1: ${{ secrets.CODEX_AUTH_JSON_1 }}
          CODEX_AUTH_JSON_2: ${{ secrets.CODEX_AUTH_JSON_2 }}
        run: bash "${WORKFLOW_BASE_PATH}/scripts/issue-agent/write-codex-auth.sh"

      - name: Write untrusted issue reference
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
          ISSUE_BODY: ${{ inputs.issue_body }}
          ISSUE_COMMENTS_JSON: ${{ inputs.issue_comments_json }}
        run: node "${WORKFLOW_BASE_PATH}/scripts/issue-agent/write-untrusted-issue.mjs"

      - name: Render prompt
        id: prompt
        env:
          TEMPLATE_PATH: ${{ env.WORKFLOW_BASE_PATH }}/.github/prompts/issue-agent/plan-issue.txt
          OUTPUT_PATH: ${{ env.PROMPT_PATH }}
          PLAN_COMMENT_PATH: ${{ env.PLAN_COMMENT_PATH }}
        run: node "${WORKFLOW_BASE_PATH}/scripts/issue-agent/render-template.mjs"

      - name: Record session log marker
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${LOG_MARKER_PATH}")"
          touch "${LOG_MARKER_PATH}"

      - name: Create minimal agent token
        if: inputs.agent_kind == 'claude'
        id: agent-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: read

      - name: Run Claude plan generation
        if: inputs.agent_kind == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.agent-token.outputs.token }}
          track_progress: false
          show_full_output: false
          display_report: false
          claude_args: --dangerously-skip-permissions --model opus
          prompt: ${{ steps.prompt.outputs.prompt }}

      - name: Run Codex plan generation
        if: inputs.agent_kind == 'codex'
        env:
          PROMPT_PATH: ${{ env.PROMPT_PATH }}
        run: bash "${WORKFLOW_BASE_PATH}/scripts/issue-agent/run-codex.sh"

      - name: Run GitHub Copilot plan generation
        if: inputs.agent_kind == 'gh-copilot'
        env:
          PROMPT_PATH: ${{ env.PROMPT_PATH }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_HOME: ${{ env.COPILOT_HOME }}
          COPILOT_SESSION_SHARE_PATH: ${{ env.COPILOT_SESSION_SHARE_PATH }}
        run: bash "${WORKFLOW_BASE_PATH}/scripts/issue-agent/run-gh-copilot.sh"

      - name: Refresh workflow base revision
        if: always()
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.sha }}
          path: ${{ env.WORKFLOW_BASE_PATH }}
          fetch-depth: 1
          persist-credentials: false

      - name: Upload session logs
        if: always()
        continue-on-error: true
        env:
          AGENT_KIND: ${{ inputs.agent_kind }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          LOG_MARKER_PATH: ${{ env.LOG_MARKER_PATH }}
          SESSION_LOG_COMMENT_PATH: ${{ env.SESSION_LOG_COMMENT_PATH }}
          CODEX_HOME: ${{ env.CODEX_HOME }}
          COPILOT_HOME: ${{ env.COPILOT_HOME }}
          COPILOT_SESSION_SHARE_PATH: ${{ env.COPILOT_SESSION_SHARE_PATH }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          KEPPO_SESSION_LOG_UPLOAD_URL: ${{ vars.KEPPO_SESSION_LOG_UPLOAD_URL }}
          KEPPO_SESSION_LOG_UPLOAD_TOKEN: ${{ secrets.KEPPO_SESSION_LOG_UPLOAD_TOKEN }}
        run: bash "${WORKFLOW_BASE_PATH}/scripts/issue-agent/upload-session-logs.sh"

      - name: Capture agent outputs
        if: always()
        id: capture
        env:
          PLAN_COMMENT_PATH: ${{ env.PLAN_COMMENT_PATH }}
          SESSION_LOG_COMMENT_PATH: ${{ env.SESSION_LOG_COMMENT_PATH }}
        run: |
          set -euo pipefail

          write_multiline_output() {
            local name="$1"
            local path="$2"
            local delimiter="EOF_$(openssl rand -hex 8)"
            {
              printf '%s<<%s\n' "${name}" "${delimiter}"
              cat "${path}"
              printf '\n%s\n' "${delimiter}"
            } >> "${GITHUB_OUTPUT}"
          }

          if [ -s "${PLAN_COMMENT_PATH}" ]; then
            echo "has_plan_comment=true" >> "${GITHUB_OUTPUT}"
            write_multiline_output plan_comment "${PLAN_COMMENT_PATH}"
          else
            echo "has_plan_comment=false" >> "${GITHUB_OUTPUT}"
          fi

          if [ -s "${SESSION_LOG_COMMENT_PATH}" ]; then
            echo "has_session_log_comment=true" >> "${GITHUB_OUTPUT}"
            write_multiline_output session_log_comment "${SESSION_LOG_COMMENT_PATH}"
          else
            echo "has_session_log_comment=false" >> "${GITHUB_OUTPUT}"
          fi

  trusted:
    needs: agent
    if: always()
    environment: ai-bots
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-issues: write

      - name: Post session log comment
        if: needs.agent.outputs.has_session_log_comment == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          COMMENT_BODY: ${{ needs.agent.outputs.session_log_comment }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = Number.parseInt(process.env.ISSUE_NUMBER ?? "", 10);
            const body = process.env.COMMENT_BODY ?? "";

            if (!Number.isFinite(issue_number)) {
              throw new Error("ISSUE_NUMBER is required");
            }

            if (!body.trim()) {
              core.info("Session log comment body was empty; skipping.");
              return;
            }

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            } catch (error) {
              if (error.status === 403 && /issue is locked/i.test(error.message || "")) {
                core.warning("Skipping session log comment because the issue is locked.");
                return;
              }
              throw error;
            }

      - name: Verify plan comment exists
        if: needs.agent.result == 'success'
        env:
          AGENT_NAME: ${{ inputs.agent_name }}
        run: |
          set -euo pipefail
          if [ "${{ needs.agent.outputs.has_plan_comment }}" != "true" ]; then
            echo "::error::${AGENT_NAME} did not write tmp/issue-agent/plan-comment.md."
            exit 1
          fi

      - name: Post plan comment
        if: needs.agent.result == 'success'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          COMMENT_BODY: ${{ needs.agent.outputs.plan_comment }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = Number.parseInt(process.env.ISSUE_NUMBER ?? "", 10);
            const body = process.env.COMMENT_BODY ?? "";

            if (!Number.isFinite(issue_number)) {
              throw new Error("ISSUE_NUMBER is required");
            }

            if (!body.trim()) {
              throw new Error("COMMENT_BODY is required");
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });

      - name: Set failure labels and comment
        if: contains(fromJSON('["failure","cancelled"]'), needs.agent.result) || failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = Number('${{ inputs.issue_number }}');
            const agentResult = '${{ needs.agent.result }}';
            const outcomeWord = agentResult === 'cancelled' ? 'was cancelled' : 'failed';
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: [
                  `The ${{ inputs.agent_name }} \`plan-issue\` run ${outcomeWord} before it could post a plan comment.`,
                  '',
                  `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ].join('\n'),
              });
            } catch (error) {
              if (error.status === 403 && /issue is locked/i.test(error.message || '')) {
                core.warning('Skipping failure comment because the issue is locked.');
                return;
              }
              throw error;
            }
