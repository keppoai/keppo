name: Codex Rebase

on:
  pull_request_target:
    types: [labeled, closed]

# Restrict default permissions; the job below declares only what it needs.
permissions: {}

concurrency:
  # Keep duplicate /sync-pr requests mutually exclusive, but do not let the
  # workflow's own sync-pr:pending label update cancel the active rebase run.
  group: codex-rebase-${{ github.event.pull_request.number }}-${{ github.event.action }}-${{ github.event.label.name || 'none' }}
  cancel-in-progress: true

jobs:
  cleanup-closed-pr:
    if: github.event.action == 'closed'
    environment: ai-bots
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create GitHub App token for base repo
        id: base-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Remove rebasing labels from closed PR
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --remove-label "sync-pr:pending" --remove-label "/sync-pr"
        env:
          GITHUB_TOKEN: ${{ steps.base-app-token.outputs.token }}

  rebase:
    environment: ai-bots
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == '/sync-pr' &&
      !contains(github.event.pull_request.labels.*.name, '/fix-pr') &&
      !contains(github.event.pull_request.labels.*.name, 'fix-pr:pending')
    runs-on: ubuntu-latest
    env:
      CODEX_HOME: tmp/sync-pr/codex-home
      PROMPT_PATH: tmp/sync-pr/agent-prompt.txt
      WORKFLOW_BASE_PATH: .workflow-base
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create GitHub App token for base repo
        id: base-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write

      - name: Check PR author
        id: check-author
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.base-app-token.outputs.token }}
          script: |
            const normalizeLogin = (login) => (login || '').replace(/\[bot\]$/i, '');
            const pr = context.payload.pull_request;
            const allowedUsers = ['wwwillchen', 'wwwillchen-bot', 'vercel', 'keppo-bot'];
            const prAuthor = normalizeLogin(pr.user.login);
            if (!allowedUsers.includes(prAuthor)) {
              console.log(`PR author ${prAuthor} is not allowed to use this workflow`);
              core.setOutput('should_continue', 'false');
              return;
            }
            // Skip if fix-pr is active — fix-pr handles its own rebase
            const labels = (pr.labels || []).map(l => l.name);
            if (labels.includes('/fix-pr') || labels.includes('fix-pr:pending')) {
              console.log(`PR #${pr.number} has active fix-pr label, skipping /sync-pr`);
              // Clean up the trigger label so it doesn't re-fire
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: '/sync-pr',
              }).catch(() => {});
              core.setOutput('should_continue', 'false');
              return;
            }
            core.setOutput('should_continue', 'true');
            core.setOutput('pr_number', pr.number);

      - name: Create GitHub App token for PR head repo
        if: steps.check-author.outputs.should_continue == 'true'
        id: head-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.event.pull_request.head.repo.owner.login }}
          repositories: ${{ github.event.pull_request.head.repo.name }}
          permission-contents: write
          permission-workflows: write

      - name: Checkout repository
        if: steps.check-author.outputs.should_continue == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ steps.head-app-token.outputs.token }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git remotes for cross-repo PR
        if: steps.check-author.outputs.should_continue == 'true'
        run: |
          # Add upstream remote pointing to the base repo for rebasing
          git remote add upstream "https://x-access-token:${BASE_APP_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch upstream ${{ github.event.pull_request.base.ref }}

          echo "Git remotes configured:"
          echo "  origin -> ${{ github.event.pull_request.head.repo.full_name }} (head repo / fork)"
          echo "  upstream -> ${{ github.repository }} (base repo / branch: ${{ github.event.pull_request.base.ref }})"
          git remote -v
        env:
          BASE_APP_TOKEN: ${{ steps.base-app-token.outputs.token }}

      - name: Checkout workflow base revision
        if: steps.check-author.outputs.should_continue == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.base-app-token.outputs.token }}
          ref: ${{ github.sha }}
          path: ${{ env.WORKFLOW_BASE_PATH }}
          fetch-depth: 1
          persist-credentials: false

      - name: Create minimal agent token
        if: steps.check-author.outputs.should_continue == 'true'
        id: agent-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: read

      - name: Install Codex CLI
        if: steps.check-author.outputs.should_continue == 'true'
        run: npm install -g @openai/codex@latest

      - name: Write Codex auth file
        if: steps.check-author.outputs.should_continue == 'true'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_AUTH_JSON_1: ${{ secrets.CODEX_AUTH_JSON_1 }}
          CODEX_AUTH_JSON_2: ${{ secrets.CODEX_AUTH_JSON_2 }}
        run: bash "${WORKFLOW_BASE_PATH}/scripts/issue-agent/write-codex-auth.sh"

      - name: Remove rebase trigger labels and add sync-pr:pending
        if: steps.check-author.outputs.should_continue == 'true'
        run: |
          gh pr edit ${{ steps.check-author.outputs.pr_number }} --repo ${{ github.repository }} --remove-label "/sync-pr" --remove-label "sync-pr:failed" --add-label "sync-pr:pending"
        env:
          GITHUB_TOKEN: ${{ steps.base-app-token.outputs.token }}

      - name: Record starting commit
        if: steps.check-author.outputs.should_continue == 'true'
        id: start-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Write Codex prompt
        if: steps.check-author.outputs.should_continue == 'true'
        run: |
          mkdir -p "$(dirname "${PROMPT_PATH}")"
          cat <<EOF > "${PROMPT_PATH}"
          You are handling a /sync-pr run for PR #${{ steps.check-author.outputs.pr_number }}.

          The workflow has already prepared the repository for you:
          - The current checkout is the PR head branch.
          - \`origin\` points to the PR head repository.
          - \`upstream\` points to the base repository.
          - The PR base branch is \`${{ github.event.pull_request.base.ref }}\`.

          Required steps:
          1. Run \`git fetch --all\`.
          2. Rebase the current branch onto \`upstream/${{ github.event.pull_request.base.ref }}\`.
          3. If the rebase conflicts, resolve the conflicts carefully and continue until the rebase completes.
          4. Run \`pnpm check\`. If it fails because of the rebase, fix the issues and rerun it until it passes.

          Important constraints:
          - Do not push.
          - Do not edit PR labels, comments, or any other GitHub state.
          - Stop only when the local branch is clean, the rebase is complete, and checks pass.
          EOF

      - name: Run PR rebase with Codex
        if: steps.check-author.outputs.should_continue == 'true'
        env:
          GH_TOKEN: ${{ steps.agent-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.agent-token.outputs.token }}
        run: bash "${WORKFLOW_BASE_PATH}/scripts/issue-agent/run-codex.sh"

      - name: Create GitHub App token for post-agent base repo operations
        if: always() && steps.check-author.outputs.should_continue == 'true'
        id: post-agent-base-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Validate rebased branch state
        if: steps.check-author.outputs.should_continue == 'true'
        id: validate
        env:
          START_SHA: ${{ steps.start-sha.outputs.sha }}
        run: |
          set -euo pipefail

          if git diff --name-only "${START_SHA}" HEAD -- .gitmodules | grep -q .; then
            echo ".gitmodules changed while .workflow-base was present in the repo" >&2
            exit 1
          fi

          gitlink_paths="$(git ls-files --stage | awk '$1 == "160000" { print $4 }')"
          if [ -n "${gitlink_paths}" ]; then
            echo "Nested gitlink entries are not allowed:" >&2
            echo "${gitlink_paths}" >&2
            exit 1
          fi

          if git diff --cached --name-only -- .workflow-base | grep -q .; then
            echo ".workflow-base must never be staged in the PR repository" >&2
            exit 1
          fi

          if git diff --name-only "${START_SHA}" HEAD -- .workflow-base | grep -q .; then
            echo ".workflow-base must never appear in agent-authored commits" >&2
            exit 1
          fi

          if git diff --name-only "${START_SHA}" HEAD -- .gitignore | grep -q . &&
            git diff "${START_SHA}" HEAD -- .gitignore | grep -F ".workflow-base" >/dev/null; then
            echo ".gitignore changes that reference .workflow-base are not allowed" >&2
            exit 1
          fi

          dirty="$(git status --short -- . ':(exclude).workflow-base')"
          if [ -n "${dirty}" ]; then
            echo "Uncommitted changes remain in the workspace:" >&2
            echo "${dirty}" >&2
            exit 1
          fi

          current_sha="$(git rev-parse HEAD)"
          if [ "${current_sha}" != "${START_SHA}" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token for post-agent PR head repo operations
        if: steps.validate.outputs.has_changes == 'true'
        id: post-agent-head-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.event.pull_request.head.repo.owner.login }}
          repositories: ${{ github.event.pull_request.head.repo.name }}
          permission-contents: write
          permission-workflows: write

      - name: Refresh push remote for post-agent pushes
        if: steps.validate.outputs.has_changes == 'true'
        run: |
          git remote set-url --push origin "https://x-access-token:${PR_HEAD_APP_TOKEN}@github.com/${{ github.event.pull_request.head.repo.full_name }}.git"
          echo "Refreshed post-agent pushurl to ${{ github.event.pull_request.head.repo.full_name }}"
        env:
          PR_HEAD_APP_TOKEN: ${{ steps.post-agent-head-app-token.outputs.token }}

      - name: Push rebased branch
        if: steps.validate.outputs.has_changes == 'true'
        run: git push --force-with-lease origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Update labels on success
        if: steps.check-author.outputs.should_continue == 'true' && success()
        run: |
          gh pr edit ${{ steps.check-author.outputs.pr_number }} --repo ${{ github.repository }} --remove-label "sync-pr:pending" --remove-label "sync-pr:failed"
        env:
          GITHUB_TOKEN: ${{ steps.post-agent-base-app-token.outputs.token }}

      - name: Update labels on cancellation
        if: steps.check-author.outputs.should_continue == 'true' && cancelled()
        run: |
          gh pr edit ${{ steps.check-author.outputs.pr_number }} --repo ${{ github.repository }} --remove-label "sync-pr:pending"
        env:
          GITHUB_TOKEN: ${{ steps.post-agent-base-app-token.outputs.token }}

      - name: Update labels on failure
        if: steps.check-author.outputs.should_continue == 'true' && failure()
        run: |
          gh pr edit ${{ steps.check-author.outputs.pr_number }} --repo ${{ github.repository }} --remove-label "sync-pr:pending" --add-label "sync-pr:failed"
        env:
          GITHUB_TOKEN: ${{ steps.post-agent-base-app-token.outputs.token }}
