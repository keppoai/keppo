name: Label PRs needing rebase

on:
  push:
    branches: [main]

concurrency:
  group: label-rebase-prs
  cancel-in-progress: true

permissions: {}

jobs:
  label-conflicting-prs:
    environment: ai-bots
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: keppoai/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-pull-requests: write
          permission-contents: read

      - uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const normalizeLogin = (login) => (login || '').replace(/\[bot\]$/i, '');
            const allowedAuthors = ['wwwillchen', 'wwwillchen-bot', 'vercel', 'keppo-bot'];

            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            for (const pr of prs) {
              try {
                if (!allowedAuthors.includes(normalizeLogin(pr.user.login))) continue;
                if (pr.draft) continue;

                // mergeable status requires an individual GET call
                let latest = (await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                })).data;

                // GitHub may not have computed mergeability yet (null).
                // Retry with exponential backoff.
                if (latest.mergeable === null) {
                  for (let attempt = 0; attempt < 3 && latest.mergeable === null; attempt++) {
                    await new Promise(r => setTimeout(r, 3000 * (attempt + 1)));
                    latest = (await github.rest.pulls.get({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: pr.number,
                    })).data;
                  }
                  if (latest.mergeable === null) {
                    console.log(`PR #${pr.number}: mergeability still unknown after retries, skipping`);
                    continue;
                  }
                }

                if (latest.mergeable_state === 'dirty') {
                  const labels = latest.labels.map(l => l.name);
                  // Don't add if already labeled, actively rebasing, or previously failed
                  if (
                    labels.includes('/sync-pr') ||
                    labels.includes('sync-pr:pending') ||
                    labels.includes('sync-pr:failed')
                  ) {
                    console.log(`PR #${pr.number} already has rebase label, skipping`);
                    continue;
                  }
                  // Don't add /sync-pr while fix-pr is active — fix-pr handles its own rebase
                  if (
                    labels.includes('/fix-pr') ||
                    labels.includes('fix-pr:pending')
                  ) {
                    console.log(`PR #${pr.number} has active fix-pr label, skipping /sync-pr`);
                    continue;
                  }
                  console.log(`Adding /sync-pr to PR #${pr.number}: ${pr.title}`);
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    labels: ['/sync-pr'],
                  });
                } else {
                  console.log(`PR #${pr.number} is mergeable (state: ${latest.mergeable_state}), skipping`);
                }
              } catch (err) {
                console.log(`Error processing PR #${pr.number}: ${err.message}`);
              }
            }
