name: keep-main-green

on:
  workflow_run:
    workflows:
      - "CI (main)"
    types:
      - completed

permissions: {}

concurrency:
  group: keep-main-green-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  dispatch:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main'
    environment: ai-bots
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: keppoai/create-github-app-token@11aba8cf1954b5713f82565e593ed0d8657c5e3d
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-actions: write

      - name: Dispatch Get Main To Green with Codex
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${REPO}/actions/workflows/get-main-to-green.yml/dispatches" \
            -f ref=main \
            -f inputs[agent]=codex
