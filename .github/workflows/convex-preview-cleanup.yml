name: Convex Preview Cleanup

on:
  schedule:
    # Every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      max_age_days:
        description: "Delete preview deployments older than this many days"
        required: false
        default: "3"
        type: string
      dry_run:
        description: "Log which deployments would be deleted without actually deleting them"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

jobs:
  cleanup:
    name: Delete stale or merged preview deployments
    runs-on: ubuntu-latest
    environment: convex-preview-cleanup
    timeout-minutes: 10

    steps:
      - name: Delete stale previews
        env:
          CONVEX_TEAM_ACCESS_TOKEN: ${{ secrets.CONVEX_TEAM_ACCESS_TOKEN }}
          CONVEX_PROJECT_ID: ${{ vars.CONVEX_PROJECT_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MAX_AGE_DAYS: ${{ inputs.max_age_days || '3' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          api_base="https://api.convex.dev/v1"
          cutoff_ms=$(( ($(date +%s) - MAX_AGE_DAYS * 86400) * 1000 ))

          echo "Max age: ${MAX_AGE_DAYS} days"
          echo "Cutoff timestamp (ms): ${cutoff_ms}"
          echo "Dry run: ${DRY_RUN}"
          echo "---"

          response=$(curl -sf \
            -H "Authorization: Bearer ${CONVEX_TEAM_ACCESS_TOKEN}" \
            "${api_base}/projects/${CONVEX_PROJECT_ID}/list_deployments?deploymentType=preview")

          total=$(echo "$response" | jq 'length')
          kept=0
          deleted=0
          old_count=0
          closed_count=0
          missing_identifier_count=0

          fetch_pull_requests() {
            local page=1
            local page_response
            local page_count

            while true; do
              if ! page_response=$(curl -sf \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?state=all&per_page=100&page=${page}"); then
                return 1
              fi

              if ! jq -e 'type == "array"' >/dev/null <<<"${page_response}"; then
                return 1
              fi

              printf '%s\n' "${page_response}"
              page_count=$(jq 'length' <<<"${page_response}")
              if [[ "${page_count}" -lt 100 ]]; then
                break
              fi
              page=$((page + 1))
            done
          }

          branch_in_list() {
            local branch="$1"
            local branch_list="$2"

            grep -Fqx -- "${branch}" <<<"${branch_list}"
          }

          should_delete_for_closed_pr() {
            local branch="$1"
            branch_debug_reason=""

            if [[ "${pr_lookup_ok}" != "true" ]]; then
              branch_debug_reason="unable to verify GitHub PR state"
              return 1
            fi

            if branch_in_list "${branch}" "${open_pr_branches}"; then
              branch_debug_reason="branch still has an open PR"
              return 1
            fi

            if branch_in_list "${branch}" "${closed_pr_branches}"; then
              branch_debug_reason="branch maps to a closed PR"
              return 0
            fi

            branch_debug_reason="branch did not match any open or closed PR head ref"
            return 1
          }

          pr_lookup_ok=false
          open_pr_branches=""
          closed_pr_branches=""
          if pr_response=$(fetch_pull_requests); then
            pr_lookup_ok=true
            open_pr_branches=$(jq -rs '
              map(.[])
              | map(select(.state == "open") | .head.ref)
              | map(select(type == "string" and length > 0))
              | unique
              | .[]
            ' <<<"${pr_response}")
            closed_pr_branches=$(jq -rs '
              map(.[])
              | map(select(.state != "open") | .head.ref)
              | map(select(type == "string" and length > 0))
              | unique
              | .[]
            ' <<<"${pr_response}")
            open_pr_count=$(jq -rs '
              map(.[])
              | map(select(.state == "open") | .head.ref)
              | map(select(type == "string" and length > 0))
              | unique
              | length
            ' <<<"${pr_response}")
            closed_pr_count=$(jq -rs '
              map(.[])
              | map(select(.state != "open") | .head.ref)
              | map(select(type == "string" and length > 0))
              | unique
              | length
            ' <<<"${pr_response}")
            echo "Loaded GitHub PR state for preview cleanup."
            echo "GitHub PR branch inventory: ${open_pr_count} open, ${closed_pr_count} closed."
          else
            echo "Warning: failed to load GitHub PR state; keeping recent previews unless they exceed the age cutoff."
          fi

          while IFS= read -r deployment; do
            name=$(echo "$deployment" | jq -r '.name')
            create_time=$(echo "$deployment" | jq -r '.createTime')
            preview_identifier=$(echo "$deployment" | jq -r '.previewIdentifier // empty')
            delete_reason=""
            created_at=$(date -u -d "@$((create_time / 1000))" 2>/dev/null || date -u -r "$((create_time / 1000))")

            echo "Inspecting preview deployment: name=${name}, previewIdentifier=${preview_identifier:-none}, created=${created_at}"

            if [[ "$create_time" -lt "$cutoff_ms" ]]; then
              delete_reason="older than ${MAX_AGE_DAYS} days"
              old_count=$((old_count + 1))
            elif [[ -n "$preview_identifier" ]]; then
              if should_delete_for_closed_pr "$preview_identifier"; then
                delete_reason="GitHub branch maps to a closed PR"
                closed_count=$((closed_count + 1))
              fi
              echo "Branch-state decision for ${name}: ${branch_debug_reason}"
            else
              missing_identifier_count=$((missing_identifier_count + 1))
              echo "Branch-state decision for ${name}: previewIdentifier missing; cannot evaluate PR/branch lifecycle."
            fi

            if [[ -n "$delete_reason" ]]; then
              if [[ "$DRY_RUN" == "true" ]]; then
                echo "[dry-run] Would delete: ${name} (${delete_reason}; created ${created_at}; previewIdentifier=${preview_identifier:-none})"
              else
                echo "Deleting: ${name} (${delete_reason})"
                curl -sf -X POST \
                  -H "Authorization: Bearer ${CONVEX_TEAM_ACCESS_TOKEN}" \
                  "${api_base}/deployments/${name}/delete"
                echo " -> deleted"
              fi
              deleted=$((deleted + 1))
            else
              kept=$((kept + 1))
            fi
          done < <(echo "$response" | jq -c '.[]')

          action="Deleted"
          if [[ "$DRY_RUN" == "true" ]]; then
            action="Would delete"
          fi

          echo "---"
          echo "Total previews: ${total}"
          echo "${action} ${deleted} preview deployment(s): ${old_count} old, ${closed_count} mapped to a closed PR."
          echo "Kept ${kept} preview deployment(s) with recent activity or an open PR."
          echo "Previews missing previewIdentifier: ${missing_identifier_count}"
