name: Convex Preview Cleanup

on:
  schedule:
    # Every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      max_age_days:
        description: "Delete preview deployments older than this many days"
        required: false
        default: "3"
        type: string
      dry_run:
        description: "Log which deployments would be deleted without actually deleting them"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

jobs:
  cleanup:
    name: Delete stale or merged preview deployments
    runs-on: ubuntu-latest
    environment: convex-preview-cleanup
    timeout-minutes: 10

    steps:
      - name: Delete stale previews
        env:
          CONVEX_TEAM_ACCESS_TOKEN: ${{ secrets.CONVEX_TEAM_ACCESS_TOKEN }}
          CONVEX_PROJECT_ID: ${{ vars.CONVEX_PROJECT_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MAX_AGE_DAYS: ${{ inputs.max_age_days || '3' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          api_base="https://api.convex.dev/v1"
          cutoff_ms=$(( ($(date +%s) - MAX_AGE_DAYS * 86400) * 1000 ))

          echo "Max age: ${MAX_AGE_DAYS} days"
          echo "Cutoff timestamp (ms): ${cutoff_ms}"
          echo "Dry run: ${DRY_RUN}"
          echo "---"

          response=$(curl -sf \
            -H "Authorization: Bearer ${CONVEX_TEAM_ACCESS_TOKEN}" \
            "${api_base}/projects/${CONVEX_PROJECT_ID}/list_deployments?deploymentType=preview")

          total=$(echo "$response" | jq 'length')
          kept=0
          deleted=0
          old_count=0
          closed_count=0

          fetch_pull_requests() {
            local page=1
            local page_response
            local page_count

            while true; do
              if ! page_response=$(curl -sf \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?state=all&per_page=100&page=${page}"); then
                return 1
              fi

              if ! jq -e 'type == "array"' >/dev/null <<<"${page_response}"; then
                return 1
              fi

              printf '%s\n' "${page_response}"
              page_count=$(jq 'length' <<<"${page_response}")
              if [[ "${page_count}" -lt 100 ]]; then
                break
              fi
              page=$((page + 1))
            done
          }

          branch_in_list() {
            local branch="$1"
            local branch_list="$2"

            grep -Fqx -- "${branch}" <<<"${branch_list}"
          }

          should_delete_for_closed_pr() {
            local branch="$1"

            if [[ "${pr_lookup_ok}" != "true" || "${base_branch_lookup_ok}" != "true" ]]; then
              echo "Warning: unable to verify GitHub PR or branch state for ${branch}; keeping preview."
              return 1
            fi

            if branch_in_list "${branch}" "${open_pr_branches}"; then
              return 1
            fi

            if branch_in_list "${branch}" "${base_repo_branches}"; then
              return 1
            fi

            branch_in_list "${branch}" "${closed_pr_branches}"
          }

          pr_lookup_ok=false
          open_pr_branches=""
          closed_pr_branches=""
          if pr_response=$(fetch_pull_requests); then
            pr_lookup_ok=true
            open_pr_branches=$(jq -rs '
              map(.[])
              | map(select(.state == "open") | .head.ref)
              | map(select(type == "string" and length > 0))
              | unique
              | .[]
            ' <<<"${pr_response}")
            closed_pr_branches=$(jq -rs '
              map(.[])
              | map(select(.state != "open") | .head.ref)
              | map(select(type == "string" and length > 0))
              | unique
              | .[]
            ' <<<"${pr_response}")
            echo "Loaded GitHub PR state for preview cleanup."
          else
            echo "Warning: failed to load GitHub PR state; keeping recent previews unless they exceed the age cutoff."
          fi

          base_branch_lookup_ok=false
          base_repo_branches=""
          if base_repo_branches=$(git ls-remote --heads \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            | sed 's#.*refs/heads/##'); then
            base_branch_lookup_ok=true
            echo "Loaded base repository branch state for preview cleanup."
          else
            echo "Warning: failed to load base repository branch state; keeping recent previews unless they exceed the age cutoff."
          fi

          while IFS= read -r deployment; do
            name=$(echo "$deployment" | jq -r '.name')
            create_time=$(echo "$deployment" | jq -r '.createTime')
            preview_identifier=$(echo "$deployment" | jq -r '.previewIdentifier // empty')
            delete_reason=""

            if [[ "$create_time" -lt "$cutoff_ms" ]]; then
              delete_reason="older than ${MAX_AGE_DAYS} days"
              old_count=$((old_count + 1))
            elif [[ -n "$preview_identifier" ]] && should_delete_for_closed_pr "$preview_identifier"; then
              delete_reason="GitHub branch has no open PR and is no longer present in the base repo"
              closed_count=$((closed_count + 1))
            fi

            if [[ -n "$delete_reason" ]]; then
              created_at=$(date -u -d "@$((create_time / 1000))" 2>/dev/null || date -u -r "$((create_time / 1000))")
              if [[ "$DRY_RUN" == "true" ]]; then
                echo "[dry-run] Would delete: ${name} (${delete_reason}; created ${created_at}; previewIdentifier=${preview_identifier:-none})"
              else
                echo "Deleting: ${name} (${delete_reason})"
                curl -sf -X POST \
                  -H "Authorization: Bearer ${CONVEX_TEAM_ACCESS_TOKEN}" \
                  "${api_base}/deployments/${name}/delete"
                echo " -> deleted"
              fi
              deleted=$((deleted + 1))
            else
              kept=$((kept + 1))
            fi
          done < <(echo "$response" | jq -c '.[]')

          action="Deleted"
          if [[ "$DRY_RUN" == "true" ]]; then
            action="Would delete"
          fi

          echo "---"
          echo "Total previews: ${total}"
          echo "${action} ${deleted} preview deployment(s): ${old_count} old, ${closed_count} without an open PR and absent from the base repo."
          echo "Kept ${kept} preview deployment(s) with recent activity or an open PR."
