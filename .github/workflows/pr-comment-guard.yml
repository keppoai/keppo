# VERY IMPORTANT:
# This workflow has elevated permissions (pull-requests:write).
# It deletes comments from untrusted authors on PRs and posts a redirect message.
# Author allowlists are enforced in the job steps below.
name: PR Comment Guard

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Restrict default permissions; each job declares only what it needs.
permissions: {}

jobs:
  moderate-comment:
    # Only run on PR comments (issue_comment fires for issues too)
    if: >-
      (github.event_name == 'pull_request_review_comment') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    runs-on: ubicloud-standard-2
    permissions:
      pull-requests: write
    steps:
      - name: Check author and moderate
        uses: actions/github-script@v7
        with:
          script: |
            const normalizeLogin = (login) => (login || '').replace(/\[bot\]$/i, '').toLowerCase();

            // Trusted authors: collaborators and bots from
            // .agents/skills/pr-fix-comments/SKILL.md
            const trustedAuthors = new Set([
              // Trusted humans
              'wwwillchen',
              'wwwillchen-bot',
              // Trusted bots
              'gemini-code-assist',
              'greptile-apps',
              'cubic-dev-ai',
              'cursor',
              'github-actions',
              'copilot',
              'vercel',
              'keppo-bot',
              'chatgpt-codex-connector',
              'devin-ai-integration',
              // BugBot (triggered by bugbot-trigger.yml)
              'bugbot-app',
            ]);

            const comment = context.payload.comment;
            const rawLogin = comment.user.login;
            const login = normalizeLogin(rawLogin);

            if (trustedAuthors.has(login)) {
              core.info(`Comment by trusted author ${rawLogin}, allowing.`);
              return;
            }

            core.info(`Comment by untrusted author ${rawLogin}, moderating.`);

            const commentId = comment.id;
            const eventName = context.eventName;

            // Delete the untrusted comment
            if (eventName === 'pull_request_review_comment') {
              await github.rest.pulls.deleteReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
              });
            } else {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
              });
            }

            core.info(`Deleted comment ${commentId} from ${rawLogin}.`);

            // Post a redirect message on the PR
            const issueNumber = context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Thank you for your interest @${login}! Please leave all feedback on GitHub Issues.`,
            });

            core.info(`Posted redirect message on PR #${issueNumber}.`);
