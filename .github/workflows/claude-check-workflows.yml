name: Claude Check Workflows

on:
  schedule:
    # Daily at 13:00 UTC (5 AM PST / 6 AM PDT)
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "Number of hours to look back for workflow runs"
        required: false
        default: 24
        type: number

permissions: {}

jobs:
  check-workflows:
    environment: ai-bots
    runs-on: namespace-profile-linux-medium
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Create read-only GitHub App token
        id: agent-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: read

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.agent-token.outputs.token }}
          persist-credentials: false

      - name: Check workflow health
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.agent-token.outputs.token }}
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: 48000
          WORKFLOW_HEALTH_REPORT_PATH: tmp/check-workflows/report.json
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.agent-token.outputs.token }}
          claude_args: --model claude-sonnet-4-5-20250929
          show_full_output: false
          display_report: true
          prompt: |
            /keppo:check-workflows ${{ inputs.hours || 24 }}

      - name: Create issue-write GitHub App token
        id: issue-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-issues: write

      - name: Apply workflow health findings
        uses: actions/github-script@v7
        env:
          REPORT_PATH: tmp/check-workflows/report.json
        with:
          github-token: ${{ steps.issue-token.outputs.token }}
          script: |
            const fs = require("node:fs");

            const reportPath = process.env.REPORT_PATH;
            if (!reportPath || !fs.existsSync(reportPath)) {
              core.setFailed(`Expected workflow health report at ${reportPath ?? "<unset>"}`);
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            if (!["healthy", "action_required"].includes(report.status)) {
              core.setFailed(`Unsupported workflow report status: ${report.status}`);
              return;
            }
            if (typeof report.summary !== "string" || report.summary.trim().length === 0) {
              core.setFailed("Workflow health report must include a non-empty summary.");
              return;
            }

            await core.summary
              .addHeading("Workflow Health Summary")
              .addRaw(report.summary, true)
              .write();

            if (report.status === "healthy") {
              core.notice("No actionable workflow problems were reported.");
              return;
            }

            const issue = report.issue;
            if (!issue || typeof issue !== "object") {
              core.setFailed("Actionable workflow reports must include an issue object.");
              return;
            }

            for (const field of ["dedupeKey", "title", "body", "updateComment"]) {
              if (typeof issue[field] !== "string" || issue[field].trim().length === 0) {
                core.setFailed(`Workflow issue field '${field}' must be a non-empty string.`);
                return;
              }
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = "workflow-health";
            const marker = `<!-- workflow-health-key:${issue.dedupeKey} -->`;

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: "0e8a16",
                description: "Automated workflow health findings",
              });
            }

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: labelName,
              per_page: 100,
            });

            const existingIssue = openIssues.find((candidate) =>
              (candidate.body ?? "").includes(marker),
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: issue.updateComment,
              });
              core.notice(`Updated existing workflow health issue #${existingIssue.number}.`);
              return;
            }

            const createdIssue = await github.rest.issues.create({
              owner,
              repo,
              title: issue.title,
              labels: [labelName],
              body: `${marker}\n${issue.body}`,
            });

            core.notice(`Created workflow health issue #${createdIssue.data.number}.`);
