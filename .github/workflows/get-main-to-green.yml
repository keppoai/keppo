name: Get Main To Green

on:
  workflow_dispatch:
    inputs:
      agent:
        description: Agent to use for the repair run
        required: true
        default: codex
        type: choice
        options:
          - codex
          - claude

permissions: {}

concurrency:
  group: get-main-to-green
  cancel-in-progress: true

jobs:
  repair:
    environment: ai-bots
    runs-on: ubicloud-standard-2
    timeout-minutes: 180
    env:
      ISSUE_BRANCH: ${{ format('{0}/get-main-to-green/{1}', inputs.agent, github.run_id) }}
      CODEX_HOME: tmp/get-main-to-green/codex-home
      CONTEXT_PATH: tmp/get-main-to-green/context.json
      SUMMARY_PATH: tmp/get-main-to-green/summary.md
      PROMPT_PATH: tmp/get-main-to-green/prompt.txt
      PR_METADATA_PATH: tmp/get-main-to-green/pr-metadata.json
      WORKFLOW_BASE_PATH: .workflow-base
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: keppoai/create-github-app-token@11aba8cf1954b5713f82565e593ed0d8657c5e3d
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Checkout mutable workspace from main
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout workflow base revision
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.sha }}
          path: ${{ env.WORKFLOW_BASE_PATH }}
          fetch-depth: 1
          persist-credentials: false

      - name: Gather latest main failure context
        id: gather
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          OUTPUT_PATH: ${{ env.CONTEXT_PATH }}
          SUMMARY_PATH: ${{ env.SUMMARY_PATH }}
        run: node "${WORKFLOW_BASE_PATH}/scripts/get-main-to-green/gather-context.mjs"

      - name: Publish selected run summary
        run: cat "${SUMMARY_PATH}" >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare repair branch from selected commit
        if: steps.gather.outputs.has_failures == 'true'
        env:
          TARGET_SHA: ${{ steps.gather.outputs.target_sha }}
        run: |
          set -euo pipefail
          git config user.name "wwwillchen"
          git config user.email "7344640+wwwillchen@users.noreply.github.com"
          git switch -c "${ISSUE_BRANCH}" "${TARGET_SHA}"

      - name: Record starting commit
        if: steps.gather.outputs.has_failures == 'true'
        id: start-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.gather.outputs.has_failures == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        if: steps.gather.outputs.has_failures == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.gather.outputs.has_failures == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Codex CLI
        if: steps.gather.outputs.has_failures == 'true' && inputs.agent == 'codex'
        run: npm install -g @openai/codex@latest

      - name: Write Codex auth file
        if: steps.gather.outputs.has_failures == 'true' && inputs.agent == 'codex'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: bash "${WORKFLOW_BASE_PATH}/scripts/issue-agent/write-codex-auth.sh"

      - name: Render agent prompt
        if: steps.gather.outputs.has_failures == 'true'
        id: prompt
        env:
          TEMPLATE_PATH: ${{ env.WORKFLOW_BASE_PATH }}/.github/prompts/get-main-to-green.txt
          OUTPUT_PATH: ${{ env.PROMPT_PATH }}
          BRANCH_NAME: ${{ env.ISSUE_BRANCH }}
          MAIN_FAILURE_CONTEXT_PATH: ${{ env.CONTEXT_PATH }}
          MAIN_FAILURE_SUMMARY_PATH: ${{ env.SUMMARY_PATH }}
          PR_METADATA_PATH: ${{ env.PR_METADATA_PATH }}
          TARGET_SHA: ${{ steps.gather.outputs.target_sha }}
          RUN_URL: ${{ steps.gather.outputs.run_url }}
        run: node "${WORKFLOW_BASE_PATH}/scripts/issue-agent/render-template.mjs"

      - name: Create minimal agent token
        if: steps.gather.outputs.has_failures == 'true'
        id: agent-token
        uses: keppoai/create-github-app-token@11aba8cf1954b5713f82565e593ed0d8657c5e3d
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: read

      - name: Run Claude
        if: steps.gather.outputs.has_failures == 'true' && inputs.agent == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.agent-token.outputs.token }}
          claude_args: --dangerously-skip-permissions --model claude-opus-4-6
          show_full_output: false
          display_report: true
          prompt: ${{ steps.prompt.outputs.prompt }}

      - name: Run Codex
        if: steps.gather.outputs.has_failures == 'true' && inputs.agent == 'codex'
        env:
          GH_TOKEN: ${{ steps.agent-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.agent-token.outputs.token }}
          PROMPT_PATH: ${{ env.PROMPT_PATH }}
        run: bash "${WORKFLOW_BASE_PATH}/scripts/issue-agent/run-codex.sh"

      - name: Validate agent commit state
        if: steps.gather.outputs.has_failures == 'true'
        id: validate
        env:
          START_SHA: ${{ steps.start-sha.outputs.sha }}
          METADATA_PATH: ${{ env.PR_METADATA_PATH }}
        run: |
          set -euo pipefail

          if git diff --name-only "${START_SHA}" HEAD -- .gitmodules | grep -q .; then
            echo ".gitmodules changed while .workflow-base was present in the repo" >&2
            exit 1
          fi

          gitlink_paths="$(git ls-files --stage | awk '$1 == "160000" { print $4 }')"
          if [ -n "${gitlink_paths}" ]; then
            echo "Nested gitlink entries are not allowed:" >&2
            echo "${gitlink_paths}" >&2
            exit 1
          fi

          if git diff --cached --name-only -- .workflow-base | grep -q .; then
            echo ".workflow-base must never be staged in the repository" >&2
            exit 1
          fi

          if git diff --name-only "${START_SHA}" HEAD -- .workflow-base | grep -q .; then
            echo ".workflow-base must never appear in agent-authored commits" >&2
            exit 1
          fi

          if git diff --name-only "${START_SHA}" HEAD -- .gitignore | grep -q . &&
            git diff "${START_SHA}" HEAD -- .gitignore | grep -F ".workflow-base" >/dev/null; then
            echo ".gitignore changes that reference .workflow-base are not allowed" >&2
            exit 1
          fi

          # Avoid staging the trusted helper checkout by using tracked and
          # untracked paths separately instead of a blanket `git add .`.
          git add -u -- .
          untracked_paths_file="$(mktemp)"
          git ls-files --others --exclude-standard -z -- . ':(exclude).workflow-base' > "${untracked_paths_file}"
          if [ -s "${untracked_paths_file}" ]; then
            git add --pathspec-from-file="${untracked_paths_file}" --pathspec-file-nul
          fi
          rm -f "${untracked_paths_file}"

          current_sha="$(git rev-parse HEAD)"
          dirty="$(git status --short -- . ':(exclude).workflow-base')"
          if [ "${current_sha}" = "${START_SHA}" ]; then
            test ! -f "${METADATA_PATH}"
            test -z "${dirty}"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${dirty}" ]; then
            echo "Uncommitted changes remain in the workspace:" >&2
            echo "${dirty}" >&2
            exit 1
          fi

          test -f "${METADATA_PATH}"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Refresh workflow base revision
        if: steps.validate.outputs.has_changes == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.sha }}
          path: ${{ env.WORKFLOW_BASE_PATH }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate PR metadata
        if: steps.validate.outputs.has_changes == 'true'
        env:
          METADATA_PATH: ${{ env.PR_METADATA_PATH }}
        run: node "${WORKFLOW_BASE_PATH}/scripts/issue-agent/validate-pr-metadata.mjs"

      - name: Parse PR metadata
        if: steps.validate.outputs.has_changes == 'true'
        id: pr
        env:
          METADATA_PATH: ${{ env.PR_METADATA_PATH }}
        run: node "${WORKFLOW_BASE_PATH}/scripts/issue-agent/export-pr-metadata.mjs"

      - name: Push branch
        if: steps.validate.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash "${WORKFLOW_BASE_PATH}/scripts/issue-agent/push-branch.sh"

      - name: Create or update PR
        if: steps.validate.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_BRANCH: ${{ env.ISSUE_BRANCH }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BODY: ${{ steps.pr.outputs.body }}
        run: bash "${WORKFLOW_BASE_PATH}/scripts/issue-agent/create-or-update-pr.sh"
