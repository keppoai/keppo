name: Codex Commit Review

on:
  schedule:
    - cron: '0 4 * * 1-5' # 4 AM UTC, weekdays
  workflow_dispatch: {}

permissions: {}

jobs:
  gather-context:
    environment: ai-bots
    runs-on: ubicloud-standard-2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_count: ${{ steps.gather.outputs.pr_count }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: keppoai/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: read

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gather PR context
        id: gather
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOOKBACK_DAYS: '3'
          OUTPUT_PATH: tmp/codex-commit-review/pr-context.json
        run: node scripts/codex-commit-review/gather-pr-context.mjs

      - name: Upload context artifact
        if: steps.gather.outputs.pr_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: pr-context
          path: tmp/codex-commit-review/pr-context.json
          retention-days: 1

  review:
    needs: gather-context
    if: needs.gather-context.outputs.pr_count != '0'
    environment: ai-bots
    runs-on: ubicloud-standard-2
    timeout-minutes: 75
    permissions:
      contents: read
    env:
      FINDINGS_PATH: tmp/codex-commit-review/findings.jsonl
      PROMPT_PATH: tmp/codex-commit-review/review-prompt.txt
      CODEX_HOME: tmp/codex-commit-review/codex-home
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download PR context
        uses: actions/download-artifact@v4
        with:
          name: pr-context
          path: tmp/codex-commit-review

      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Write Codex auth file
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: bash scripts/codex-commit-review/write-codex-auth.sh

      - name: Render review prompt
        id: prompt
        env:
          TEMPLATE_PATH: .github/prompts/codex-commit-review/review.txt
          OUTPUT_PATH: ${{ env.PROMPT_PATH }}
          FINDINGS_PATH: ${{ env.FINDINGS_PATH }}
          CONTEXT_PATH: tmp/codex-commit-review/pr-context.json
        run: node scripts/issue-agent/render-template.mjs

      - name: Run Codex review
        timeout-minutes: 55
        continue-on-error: true
        env:
          PROMPT_PATH: ${{ env.PROMPT_PATH }}
        run: bash scripts/codex-commit-review/run-codex.sh

      - name: Ensure findings file exists
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${FINDINGS_PATH}")"
          touch "${FINDINGS_PATH}"

      - name: Upload findings artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-findings
          path: ${{ env.FINDINGS_PATH }}
          retention-days: 1

  verify:
    needs: [gather-context, review]
    if: always() && needs.review.result != 'skipped'
    environment: ai-bots
    runs-on: ubicloud-standard-2
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      ACTIONS_PATH: tmp/codex-commit-review/actions.jsonl
      PROMPT_PATH: tmp/codex-commit-review/verify-prompt.txt
      CODEX_HOME: tmp/codex-commit-review/codex-home
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download PR context
        uses: actions/download-artifact@v4
        with:
          name: pr-context
          path: tmp/codex-commit-review

      - name: Download review findings
        uses: actions/download-artifact@v4
        with:
          name: review-findings
          path: tmp/codex-commit-review

      - name: Check for CRITICAL/HIGH findings
        id: check
        run: |
          set -euo pipefail
          findings_path="tmp/codex-commit-review/findings.jsonl"
          if [ ! -s "${findings_path}" ]; then
            echo "No findings to verify."
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Count only CRITICAL/HIGH findings
          count=0
          while IFS= read -r line; do
            if echo "${line}" | grep -qiE '"severity"\s*:\s*"(CRITICAL|HIGH)"'; then
              count=$((count + 1))
            fi
          done < "${findings_path}"
          echo "Found ${count} CRITICAL/HIGH findings to verify."
          if [ "${count}" -eq 0 ]; then
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Codex CLI
        if: steps.check.outputs.has_findings == 'true'
        run: npm install -g @openai/codex@latest

      - name: Write Codex auth file
        if: steps.check.outputs.has_findings == 'true'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: bash scripts/codex-commit-review/write-codex-auth.sh

      - name: Render verify prompt
        if: steps.check.outputs.has_findings == 'true'
        id: prompt
        env:
          TEMPLATE_PATH: .github/prompts/codex-commit-review/verify.txt
          OUTPUT_PATH: ${{ env.PROMPT_PATH }}
          ACTIONS_PATH: ${{ env.ACTIONS_PATH }}
          FINDINGS_PATH: tmp/codex-commit-review/findings.jsonl
          CONTEXT_PATH: tmp/codex-commit-review/pr-context.json
        run: node scripts/issue-agent/render-template.mjs

      - name: Run Codex verification
        if: steps.check.outputs.has_findings == 'true'
        timeout-minutes: 30
        continue-on-error: true
        env:
          PROMPT_PATH: ${{ env.PROMPT_PATH }}
        run: bash scripts/codex-commit-review/run-codex.sh

      - name: Ensure actions file exists
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${ACTIONS_PATH}")"
          touch "${ACTIONS_PATH}"

      - name: Upload actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: verified-actions
          path: ${{ env.ACTIONS_PATH }}
          retention-days: 1

  process-findings:
    needs: [gather-context, review, verify]
    if: always() && needs.review.result != 'skipped'
    environment: ai-bots
    runs-on: ubicloud-standard-2
    permissions:
      issues: write
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: keppoai/create-github-app-token@v2
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-repository-advisories: write

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.repository.default_branch || 'main' }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download verified actions
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: verified-actions
          path: tmp/codex-commit-review

      - name: Process findings
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ACTIONS_PATH: tmp/codex-commit-review/actions.jsonl
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node scripts/codex-commit-review/process-findings.mjs
