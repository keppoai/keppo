name: PR Review

# https://github.com/anthropics/claude-code-action/blob/main/examples/pr-review-comprehensive.yml

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

# Restrict default permissions; each job declares only what it needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    environment: ai-bots
    if: |
      github.event.pull_request.user.login == 'wwwillchen' ||
      github.event.pull_request.user.login == 'wwwillchen-bot' ||
      github.event.pull_request.user.login == 'vercel' ||
      github.event.pull_request.user.login == 'vercel[bot]' ||
      github.event.pull_request.user.login == 'keppo-bot' ||
      github.event.pull_request.user.login == 'keppo-bot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: keppoai/create-github-app-token@11aba8cf1954b5713f82565e593ed0d8657c5e3d
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write

      - name: Checkout trusted workflow repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: PR Review
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: 48000
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_non_write_users: "wwwillchen-bot,vercel,keppo-bot"
          allowed_bots: "vercel,keppo-bot"
          track_progress: false
          show_full_output: false
          display_report: true
          prompt: |
            /keppo:multi-pr-review ${{ github.event.pull_request.number }} ${{ github.repository }}
          claude_args: |
            --dangerously-skip-permissions --model claude-opus-4-6 --allowedTools "mcp__github_inline_comment__create_inline_comment"

  codex-review:
    environment: ai-bots
    if: |
      github.event.pull_request.user.login == 'wwwillchen' ||
      github.event.pull_request.user.login == 'wwwillchen-bot' ||
      github.event.pull_request.user.login == 'vercel' ||
      github.event.pull_request.user.login == 'vercel[bot]' ||
      github.event.pull_request.user.login == 'keppo-bot' ||
      github.event.pull_request.user.login == 'keppo-bot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      pull-requests: write
    env:
      REVIEW_CONTEXT_PATH: tmp/pr-review/codex-context.json
      REVIEW_PROMPT_PATH: tmp/pr-review/codex-prompt.txt
      REVIEW_OUTPUT_PATH: tmp/pr-review/codex-review.json
      CODEX_HOME: tmp/pr-review/codex-home
    steps:
      - name: Create read-only agent token
        id: agent-token
        uses: keppoai/create-github-app-token@11aba8cf1954b5713f82565e593ed0d8657c5e3d
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: read

      - name: Create PR write token
        id: review-token
        uses: keppoai/create-github-app-token@11aba8cf1954b5713f82565e593ed0d8657c5e3d
        with:
          app-id: ${{ vars.KEPPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.KEPPO_GITHUB_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Checkout trusted workflow repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build PR review context
        id: context
        env:
          GITHUB_TOKEN: ${{ steps.agent-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          OUTPUT_PATH: ${{ env.REVIEW_CONTEXT_PATH }}
        run: node scripts/pr-review/build-context.mjs

      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Write Codex auth file
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: bash scripts/codex-commit-review/write-codex-auth.sh

      - name: Render Codex review prompt
        env:
          TEMPLATE_PATH: .github/prompts/codex-pr-review.txt
          OUTPUT_PATH: ${{ env.REVIEW_PROMPT_PATH }}
          CONTEXT_PATH: ${{ env.REVIEW_CONTEXT_PATH }}
          OUTPUT_JSON_PATH: ${{ env.REVIEW_OUTPUT_PATH }}
        run: node scripts/issue-agent/render-template.mjs

      - name: Run Codex PR review
        env:
          PROMPT_PATH: ${{ env.REVIEW_PROMPT_PATH }}
        run: bash scripts/codex-commit-review/run-codex.sh

      - name: Refresh trusted post-agent helpers
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false
          path: tmp/pr-review/trusted-post-agent

      - name: Validate Codex review output
        env:
          CONTEXT_PATH: ${{ env.REVIEW_CONTEXT_PATH }}
          REVIEW_PATH: ${{ env.REVIEW_OUTPUT_PATH }}
          EXPECTED_CONTEXT_SHA: ${{ steps.context.outputs.context_sha }}
        run: node tmp/pr-review/trusted-post-agent/scripts/pr-review/validate-review.mjs

      - name: Post Codex review comment
        uses: actions/github-script@v7
        env:
          REVIEW_PATH: ${{ env.REVIEW_OUTPUT_PATH }}
        with:
          github-token: ${{ steps.review-token.outputs.token }}
          script: |
            const fs = require('node:fs');

            const reviewPath = process.env.REVIEW_PATH;
            if (!reviewPath) {
              throw new Error('REVIEW_PATH is required');
            }

            const parsed = JSON.parse(fs.readFileSync(reviewPath, 'utf8'));
            const summary = String(parsed.summary || '').trim();
            if (!summary) {
              throw new Error('Validated Codex review is missing summary text');
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const body = [
              '## :mag: Code Review Summary (Codex)',
              '',
              summary,
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
            core.info('Created Codex review comment');
